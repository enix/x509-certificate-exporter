# A secretTypes entry with format: der — raw single-blob cert or CRL,
# the wire format produced by CRL Distribution Points. Locks down
# schema acceptance of the new format value alongside pem and pkcs12.
secretsExporter:
  secretTypes:
    - type: Opaque
      key: revocation.crl
      format: der
    - type: Opaque
      key: cert.der
      format: der
