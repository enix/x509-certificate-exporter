{{- if .Values.prometheusRules.create }}
{{- $rulePrefix:= .Values.prometheusRules.rulePrefix }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "x509-certificate-exporter.fullname" . }}
  namespace: {{ include "x509-certificate-exporter.namespace" . }}
  labels:
    {{- include "x509-certificate-exporter.labels" . | nindent 4 }}
    {{- with .Values.prometheusRules.extraLabels }}
    {{- . | toYaml | trim | nindent 4 }}
    {{- end }}
spec:
  groups:
  {{- if .Values.prometheusRules.disableBuiltinAlertGroup }}
    {{- if not (len .Values.prometheusRules.extraAlertGroups) }}
      {{ fail "Extra alert groups (extraAlertGroups) are required when disableBuiltinAlertGroup is set!" }}
    {{- end }}
  {{- else }}
  - name: x509-certificate-exporter.rules
    rules:
    {{- if .Values.prometheusRules.alertOnReadErrors }}
    - alert: '{{ printf "%s %s" $rulePrefix "X509ExporterReadErrors" | trim }}'
      expr: increase(x509_source_errors_total[15m]) > 0
      for: 5m
      labels:
        severity: {{ .Values.prometheusRules.readErrorsSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: Increasing read errors for x509-certificate-exporter
        description: Over the last 15 minutes, this x509-certificate-exporter instance has experienced errors reading certificate files or querying the Kubernetes API. This could be caused by a misconfiguration if triggered when the exporter starts.
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    {{- end }}
    {{- if .Values.prometheusRules.alertOnSourceDown }}
    - alert: '{{ printf "%s %s" $rulePrefix "SourceDown" | trim }}'
      expr: x509_source_up == 0
      for: 5m
      labels:
        severity: {{ .Values.prometheusRules.sourceDownSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: x509-certificate-exporter source is not reporting healthy
        description: Source `{{ "{{" }} $labels.source_name {{ "}}" }}` (kind `{{ "{{" }} $labels.source_kind {{ "}}" }}`) failed its initial sync or has gone unhealthy. While this lasts, certificates it normally watches are not being checked — a silently expired cert is possible. Common causes are RBAC denials, persistent K8s API errors, or unreadable file paths.
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    {{- end }}
    {{- if .Values.prometheusRules.alertOnPassphraseFailures }}
    - alert: '{{ printf "%s %s" $rulePrefix "KeystorePassphraseFailures" | trim }}'
      expr: (increase(x509_pkcs12_passphrase_failures_total[15m]) > 0) or (increase(x509_jks_passphrase_failures_total[15m]) > 0)
      for: 15m
      labels:
        severity: {{ .Values.prometheusRules.passphraseFailuresSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: Keystore passphrase failures observed
        description: Source `{{ "{{" }} $labels.source_name {{ "}}" }}` recorded PKCS#12 or JKS/JCEKS decode failures with reason `bad_passphrase` over the last 15 minutes. The configured passphrase is wrong, missing, or pointing at the wrong key — the affected keystores are not contributing any certificate metrics.
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    {{- end }}
    {{- if .Values.prometheusRules.alertOnCertificateErrors }}
    - alert: '{{ printf "%s %s" $rulePrefix "CertificateError" | trim }}'
      expr: x509_cert_error > 0
      for: 15m
      labels:
        severity: {{ .Values.prometheusRules.certificateErrorsSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: Certificate cannot be decoded
        description: Certificate could not be decoded {{ "{{if" }} $labels.secret_name {{ "}}" }}in Kubernetes secret `{{ "{{" }} $labels.secret_namespace {{ "}}" }}/{{ "{{" }} $labels.secret_name {{ "}}" }}`{{ "{{else}}" }}at location `{{ "{{" }} $labels.filepath {{ "}}" }}`{{ "{{end}}" }}
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    {{- end }}
    - alert: '{{ printf "%s %s" $rulePrefix "CertificateRenewal" | trim }}'
      expr: (x509_cert_not_after - time()) < ({{ .Values.prometheusRules.warningDaysLeft }} * 86400)
      for: 15m
      labels:
        severity: {{ .Values.prometheusRules.certificateRenewalsSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: Certificate should be renewed
        description: Certificate for `{{ "{{" }} $labels.subject_CN {{ "}}" }}` should be renewed as it expires in {{`{{`}} humanizeDuration $value {{`}}`}} {{ "{{if" }} $labels.secret_name {{ "}}" }}in Kubernetes secret `{{ "{{" }} $labels.secret_namespace {{ "}}" }}/{{ "{{" }} $labels.secret_name {{ "}}" }}`{{ "{{else}}" }}at location `{{ "{{" }} $labels.filepath {{ "}}" }}`{{ "{{end}}" }}
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    - alert: '{{ printf "%s %s" $rulePrefix "CertificateExpiration" | trim }}'
      expr: (x509_cert_not_after - time()) < ({{ .Values.prometheusRules.criticalDaysLeft }} * 86400)
      for: 15m
      labels:
        severity: {{ .Values.prometheusRules.certificateExpirationsSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: Certificate is about to expire
        description: Certificate for `{{ "{{" }} $labels.subject_CN {{ "}}" }}` is about to expire in {{`{{`}} humanizeDuration $value {{`}}`}} {{ "{{if" }} $labels.secret_name {{ "}}" }}in Kubernetes secret `{{ "{{" }} $labels.secret_namespace {{ "}}" }}/{{ "{{" }} $labels.secret_name {{ "}}" }}`{{ "{{else}}" }}at location `{{ "{{" }} $labels.filepath {{ "}}" }}`{{ "{{end}}" }}
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    {{- if .Values.prometheusRules.alertOnCertificateNotYetValid }}
    - alert: '{{ printf "%s %s" $rulePrefix "CertificateNotYetValid" | trim }}'
      # Depends on `exposeNotBeforeMetric: true` — without it the
      # `x509_cert_not_before` series isn't emitted and this rule is a
      # silent no-op. Documented in the values comment alongside.
      expr: (x509_cert_not_before - time()) > 0
      for: 15m
      labels:
        severity: {{ .Values.prometheusRules.certificateNotYetValidSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: Certificate is not yet valid
        description: Certificate for `{{ "{{" }} $labels.subject_CN {{ "}}" }}` becomes valid in {{`{{`}} humanizeDuration $value {{`}}`}} {{ "{{if" }} $labels.secret_name {{ "}}" }}in Kubernetes secret `{{ "{{" }} $labels.secret_namespace {{ "}}" }}/{{ "{{" }} $labels.secret_name {{ "}}" }}`{{ "{{else}}" }}at location `{{ "{{" }} $labels.filepath {{ "}}" }}`{{ "{{end}}" }}. Likely a clock drift, a misdated issuance, or a planned-future cert that shipped early.
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    {{- end }}
    {{- if .Values.prometheusRules.alertOnCertificateCollisions }}
    - alert: '{{ printf "%s %s" $rulePrefix "CertificateCollision" | trim }}'
      # Targets the `_dropped_total` counter so the alert only fires for
      # actual data-loss (registry CollisionNever policy). The detect-only
      # counter `x509_cert_collision_total` keeps ticking under the
      # default CollisionAuto policy, where the discriminator resolves
      # the overlap and no data is lost — that signal stays available as
      # a diagnostic on dashboards but doesn't page.
      expr: increase(x509_cert_collision_dropped_total[1h]) > 0
      for: 15m
      labels:
        severity: {{ .Values.prometheusRules.certificateCollisionsSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: Certificate label collision dropped a series
        description: At least one certificate observed by source kind `{{ "{{" }} $labels.source_kind {{ "}}" }}` was dropped because it shared its Prometheus label set with another and the registry is configured with `Collision=Never`. Its expiration will not raise an alert. Typically caused by overlapping `secretTypes` / `configMapKeys` patterns, or identical subjects in two distinct keystores; either disambiguate the source config or switch the registry to the default `Auto` policy so the discriminator label disambiguates the series instead.
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    {{- end }}
    {{- if .Values.prometheusRules.alertOnCRLs }}
    - alert: '{{ printf "%s %s" $rulePrefix "CRLNeedsRefresh" | trim }}'
      expr: (x509_crl_next_update - time()) < ({{ .Values.prometheusRules.crlWarningDaysLeft }} * 86400) and x509_crl_stale == 0
      for: 15m
      labels:
        severity: {{ .Values.prometheusRules.crlNeedsRefreshSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: CRL needs to be refreshed
        description: CRL issued by `{{ "{{" }} $labels.issuer_CN {{ "}}" }}` reaches its nextUpdate in {{`{{`}} humanizeDuration $value {{`}}`}} {{ "{{if" }} $labels.secret_name {{ "}}" }}in Kubernetes secret `{{ "{{" }} $labels.secret_namespace {{ "}}" }}/{{ "{{" }} $labels.secret_name {{ "}}" }}`{{ "{{else}}" }}at location `{{ "{{" }} $labels.filepath {{ "}}" }}`{{ "{{end}}" }}
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    - alert: '{{ printf "%s %s" $rulePrefix "CRLStale" | trim }}'
      expr: x509_crl_stale > 0
      for: 15m
      labels:
        severity: {{ .Values.prometheusRules.crlStaleSeverity }}
        {{- if .Values.prometheusRules.alertExtraLabels }}
        {{- toYaml .Values.prometheusRules.alertExtraLabels | nindent 8 }}
        {{- end }}
      annotations:
        summary: CRL is stale (past its nextUpdate)
        description: CRL issued by `{{ "{{" }} $labels.issuer_CN {{ "}}" }}` is past its nextUpdate — clients validating against this CRL are likely to reject the issuer's certs {{ "{{if" }} $labels.secret_name {{ "}}" }}in Kubernetes secret `{{ "{{" }} $labels.secret_namespace {{ "}}" }}/{{ "{{" }} $labels.secret_name {{ "}}" }}`{{ "{{else}}" }}at location `{{ "{{" }} $labels.filepath {{ "}}" }}`{{ "{{end}}" }}
        {{- if .Values.prometheusRules.alertExtraAnnotations }}
        {{- toYaml .Values.prometheusRules.alertExtraAnnotations | nindent 8 }}
        {{- end }}
    {{- end }}
  {{- end }}
{{- range .Values.prometheusRules.extraAlertGroups }}
  - {{ tpl (toYaml .) $ | indent 4 | trim }}
{{- end }}
{{- end }}
