{{/*
Self-signed serving cert for the kube-rbac-proxy sidecar. Required
because upstream is removing the proxy's built-in auto-generation
(see https://github.com/brancz/kube-rbac-proxy/issues/187).

We generate a fresh cert at first install and reuse it across helm
upgrades via `lookup` — that way the cert is stable for clients that
pin the bundle, and a `helm upgrade` doesn't churn the cert (which
would force every scraper to re-fetch). When `lookup` returns nothing
(e.g. `helm template` / `helm lint` outside a real cluster), we
re-generate; this is fine because tests only care that the manifest
is valid YAML, not that the cert is durable.

Override entirely by setting `rbacProxy.tls.existingSecretName` to
the name of a pre-provisioned Secret (e.g. cert-manager-managed) —
then this template is skipped.
*/}}
{{- if and .Values.rbacProxy.enabled (not .Values.rbacProxy.tls.existingSecretName) }}
{{- $secretName := include "x509-certificate-exporter.rbacProxy.tlsSecretName" . -}}
{{- $ns := include "x509-certificate-exporter.namespace" . -}}
{{- $svc := include "x509-certificate-exporter.fullname" . -}}
{{- $existing := lookup "v1" "Secret" $ns $secretName -}}
{{- $cert := dict -}}
{{- if and $existing (index $existing.data "tls.crt") (index $existing.data "tls.key") -}}
{{- $cert = dict "Cert" (index $existing.data "tls.crt" | b64dec) "Key" (index $existing.data "tls.key" | b64dec) -}}
{{- else -}}
{{- $altNames := list $svc (printf "%s.%s" $svc $ns) (printf "%s.%s.svc" $svc $ns) (printf "%s.%s.svc.cluster.local" $svc $ns) -}}
{{- $cert = genSelfSignedCert $svc nil $altNames 365 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $ns }}
  labels:
    {{- include "x509-certificate-exporter.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
