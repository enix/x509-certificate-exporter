# Mirrors the pkcs12 fixture: `jks.passphraseSecretRef` shape with optional
# `namespace` so a JKS truststore in any workload namespace can reach a
# centralized passphrase vault.
secretsExporter:
  secretTypes:
    - type: Opaque
      key: truststore.jks
      format: jks
      jks:
        passphraseSecretRef:
          namespace: vault
          name: jks-passphrase
          key: passphrase
