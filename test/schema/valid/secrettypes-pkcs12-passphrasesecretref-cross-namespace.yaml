# Locks down the nested `pkcs12.passphraseSecretRef` shape with optional
# `namespace` (kept optional in the schema so workloads in any namespace
# can reach a centralized vault).
secretsExporter:
  secretTypes:
    - type: Opaque
      key: keystore.p12
      format: pkcs12
      pkcs12:
        passphraseSecretRef:
          namespace: vault
          name: keystore-passphrase
          key: passphrase
