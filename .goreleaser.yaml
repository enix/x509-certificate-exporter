# GoReleaser config — drives the entire `Release` workflow:
# binaries × OS/arch, archives, checksums, container images (multi-arch,
# multi-registry, two variants), cosign keyless on everything, GitHub
# Release with auto-detected prerelease.
#
# Image SBOMs (CycloneDX via syft) are produced in a separate workflow
# step, not here — GoReleaser's image SBOM integration is less mature
# than its binary SBOM, and a post-loop is more flexible.
#
# IMAGE_NAME is the only overridable knob: forks set it via the
# repo-level `vars.IMAGE_NAME` (accessible without environment access,
# so the build phase of release.yaml can read it pre-approval).
# Registries (ghcr/quay/docker.io) and namespace (`enix`) are
# hardcoded — change in this file if a fork needs different ones.
#
# GORELEASER_PUBLISH_TARGETS controls which image registries are
# pushed to in the dockers_v2 step:
#   - unset (default): all three registries (ghcr/quay/docker.io). Used
#     by `task build:image:*` snapshots and by manual `goreleaser
#     release` runs.
#   - "ghcr-only":     only GHCR. Used by release.yaml's build phase,
#     which signs images on GHCR pre-approval; the publish phase
#     mirrors them to quay/docker.io via `cosign copy` (preserves
#     signatures, attestations, SBOMs).
#
# Reference: https://goreleaser.com/customization/

version: 2

project_name: x509-certificate-exporter

# Verify module integrity before release without modifying the working tree
# (tidy would risk a dirty-tree abort if it produces changes).
before:
  hooks:
    - go mod verify

# ─── Binaries ────────────────────────────────────────────────────────────────
# Two entries gated by GORELEASER_LOCAL_PLATFORM=1: full cross-OS
# matrix (CI / `task build:image:all`) vs. Linux-only with the three supported
# arches (`task build:image:host` — fast iteration). Cross-compiling to all
# three Linux archs is essentially free in Go, but skipping the 20+
# non-Linux targets shaves real seconds. dockers_v2's local entries
# pick the right one via `.Runtime.Goarch`. Build flags are reused
# across both entries via YAML anchors.
builds:
  - id: x509ce
    skip: '{{ if or (eq (envOrDefault "GORELEASER_LOCAL_PLATFORM" "") "1") (eq (envOrDefault "GORELEASER_TILT" "") "1") }}true{{ end }}'
    main: &build-main ./cmd/x509-certificate-exporter
    binary: &build-binary x509-certificate-exporter
    env: &build-env
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - freebsd
      - illumos
      - netbsd
      - openbsd
      - solaris
      - windows
    goarch:
      - amd64
      - arm64
      - riscv64
      - "386"
    ignore:
      - { goos: darwin, goarch: riscv64 }
      - { goos: darwin, goarch: "386" }
      - { goos: illumos, goarch: arm64 }
      - { goos: illumos, goarch: riscv64 }
      - { goos: illumos, goarch: "386" }
      - { goos: netbsd, goarch: riscv64 }
      - { goos: openbsd, goarch: riscv64 }
      - { goos: solaris, goarch: arm64 }
      - { goos: solaris, goarch: riscv64 }
      - { goos: solaris, goarch: "386" }
      - { goos: windows, goarch: riscv64 }
    flags: &build-flags
      - -tags=netgo,osusergo
      - -trimpath
    ldflags: &build-ldflags
      - -s -w
      - -X github.com/enix/x509-certificate-exporter/v4/internal/product.version={{.Version}}
      - -X github.com/enix/x509-certificate-exporter/v4/internal/product.buildTime={{.Date}}
      - -X github.com/enix/x509-certificate-exporter/v4/internal/product.gitCommit={{.FullCommit}}

  - id: x509ce-local
    skip: '{{ if or (eq (envOrDefault "GORELEASER_LOCAL_PLATFORM" "") "1") (eq (envOrDefault "GORELEASER_TILT" "") "1") }}{{ else }}true{{ end }}'
    main: *build-main
    binary: *build-binary
    env: *build-env
    goos: [linux]
    goarch: [amd64, arm64, riscv64]
    flags: *build-flags
    ldflags: *build-ldflags

# ─── Archives ────────────────────────────────────────────────────────────────
archives:
  - id: default
    ids: [x509ce, x509ce-local]
    name_template: "x509-certificate-exporter-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE

# ─── Checksums ───────────────────────────────────────────────────────────────
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ─── Cosign signature on the checksums file ──────────────────────────────────
# Signing the checksums (rather than each archive individually) is the
# canonical SLSA-friendly pattern. Verifiers fetch checksums.txt + the
# sigstore bundle, verify the signature, then verify each archive's
# hash from the checksums file.
#
# Bundle format (cosign v3+ default): one self-contained
# `checksums.txt.sigstore.json` carries both the signature and the
# signing certificate, replacing the v2-era pair `.sig` + `.pem`. We
# repurpose goreleaser's `${signature}` template to point at the
# bundle path so goreleaser still uploads the artifact to the GitHub
# Release. Recommended migration path per goreleaser upstream
# (https://goreleaser.com/blog/cosign-v3/).
#
# Verification: `cosign verify-blob --bundle checksums.txt.sigstore.json checksums.txt`
# (one file, one flag — see docs/hardening.md).
signs:
  - id: checksum-cosign
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}
    output: true

# ─── Container images ────────────────────────────────────────────────────────
# Two variants. `scratch` is the project default — minimal attack
# surface, no shell, no libc — and gets the bare tag. `busybox` is the
# alternative for environments that need a shell for debugging via
# `kubectl exec` and gets the `-busybox` suffix.
#
# Each entry runs a single `docker buildx build` with all platforms +
# all registries + all tags resolved in one go — no manual manifest
# stitching.
#
# Tag layout:
#   scratch: :VERSION         + :latest    (default; floating ":latest" skipped on snapshots and prereleases)
#   busybox: :VERSION-busybox + :busybox   (alt;     floating ":busybox" skipped on snapshots and prereleases)
#
# Floating tags ("latest", "busybox") are skipped on prereleases too —
# `.Prerelease` is the semver suffix (e.g. "alpha.3" for v4.0.0-alpha.3,
# empty for stable). We don't want a `:latest` pull to ever land a user
# on an alpha/beta/rc image.
#
# Built-in `sbom: false` because the release.yaml post-loop produces
# CycloneDX SBOMs via syft + cosign attestation — that's the canonical
# artifact for this project. Keeping dockers_v2's default in-toto
# attestation off avoids duplicate, conflicting SBOM payloads.
#
# build/Dockerfile.busybox / build/Dockerfile.scratch use
# $TARGETPLATFORM/<binary> (required by dockers_v2's per-platform
# context layout).
#
# Each variant has TWO entries, gated by GORELEASER_LOCAL_PLATFORM=1:
#   - default (env unset): full multi-arch (linux/amd64,arm64,riscv64).
#     Used by CI and `task build:image:all`.
#   - local (env=1):       host-arch only. Used by `task build:image:host`
#     for fast iteration, skipping QEMU cross-builds.
# Exactly one entry per variant is active per run via the `disable:`
# template. Labels are reused across pairs via YAML anchors.
dockers_v2:
  - id: scratch
    disable: '{{ if or (eq (envOrDefault "GORELEASER_LOCAL_PLATFORM" "") "1") (eq (envOrDefault "GORELEASER_TILT" "") "1") (eq (envOrDefault "GORELEASER_PUBLISH_TARGETS" "") "ghcr-only") }}true{{ end }}'
    ids: [x509ce]
    dockerfile: build/Dockerfile.scratch
    platforms: &scratch-platforms
      - linux/amd64
      - linux/arm64
      - linux/riscv64
    images:
      - "ghcr.io/enix/{{ .Env.IMAGE_NAME }}"
      - "quay.io/enix/{{ .Env.IMAGE_NAME }}"
      - "docker.io/enix/{{ .Env.IMAGE_NAME }}"
    tags: &scratch-tags
      - "{{ .Version }}"
      - '{{ if and (not .IsSnapshot) (eq .Prerelease "") }}latest{{ end }}'
    sbom: false
    labels: &scratch-labels
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "Prometheus exporter for x509 certificates expiration"
      org.opencontainers.image.url: "https://github.com/enix/x509-certificate-exporter"
      org.opencontainers.image.source: "https://github.com/enix/x509-certificate-exporter"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: "MIT"

  # GHCR-only twin of `scratch`. Active when GORELEASER_PUBLISH_TARGETS
  # is set to "ghcr-only" (release.yaml's build phase). Same multi-arch
  # build, single push target — the publish phase mirrors to quay and
  # docker.io with cosign copy.
  - id: scratch-ghcr
    disable: '{{ if ne (envOrDefault "GORELEASER_PUBLISH_TARGETS" "") "ghcr-only" }}true{{ end }}'
    ids: [x509ce]
    dockerfile: build/Dockerfile.scratch
    platforms: *scratch-platforms
    images:
      - "ghcr.io/enix/{{ .Env.IMAGE_NAME }}"
    tags: *scratch-tags
    sbom: false
    labels: *scratch-labels

  - id: scratch-local
    disable: '{{ if eq (envOrDefault "GORELEASER_LOCAL_PLATFORM" "") "1" }}{{ else }}true{{ end }}'
    ids: [x509ce-local]
    dockerfile: build/Dockerfile.scratch
    platforms:
      - "linux/{{ .Runtime.Goarch }}"
    images:
      - "ghcr.io/enix/{{ .Env.IMAGE_NAME }}"
      - "quay.io/enix/{{ .Env.IMAGE_NAME }}"
      - "docker.io/enix/{{ .Env.IMAGE_NAME }}"
    tags: *scratch-tags
    sbom: false
    labels: *scratch-labels

  - id: busybox
    disable: '{{ if or (eq (envOrDefault "GORELEASER_LOCAL_PLATFORM" "") "1") (eq (envOrDefault "GORELEASER_TILT" "") "1") (eq (envOrDefault "GORELEASER_PUBLISH_TARGETS" "") "ghcr-only") }}true{{ end }}'
    ids: [x509ce]
    dockerfile: build/Dockerfile.busybox
    platforms: &busybox-platforms
      - linux/amd64
      - linux/arm64
      - linux/riscv64
    images:
      - "ghcr.io/enix/{{ .Env.IMAGE_NAME }}"
      - "quay.io/enix/{{ .Env.IMAGE_NAME }}"
      - "docker.io/enix/{{ .Env.IMAGE_NAME }}"
    tags: &busybox-tags
      - "{{ .Version }}-busybox"
      - '{{ if and (not .IsSnapshot) (eq .Prerelease "") }}busybox{{ end }}'
    sbom: false
    labels: &busybox-labels
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "Prometheus exporter for x509 certificates expiration (busybox variant)"
      org.opencontainers.image.url: "https://github.com/enix/x509-certificate-exporter"
      org.opencontainers.image.source: "https://github.com/enix/x509-certificate-exporter"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: "MIT"

  # GHCR-only twin of `busybox`. See scratch-ghcr for context.
  - id: busybox-ghcr
    disable: '{{ if ne (envOrDefault "GORELEASER_PUBLISH_TARGETS" "") "ghcr-only" }}true{{ end }}'
    ids: [x509ce]
    dockerfile: build/Dockerfile.busybox
    platforms: *busybox-platforms
    images:
      - "ghcr.io/enix/{{ .Env.IMAGE_NAME }}"
    tags: *busybox-tags
    sbom: false
    labels: *busybox-labels

  - id: busybox-local
    disable: '{{ if eq (envOrDefault "GORELEASER_LOCAL_PLATFORM" "") "1" }}{{ else }}true{{ end }}'
    ids: [x509ce-local]
    dockerfile: build/Dockerfile.busybox
    platforms:
      - "linux/{{ .Runtime.Goarch }}"
    images:
      - "ghcr.io/enix/{{ .Env.IMAGE_NAME }}"
      - "quay.io/enix/{{ .Env.IMAGE_NAME }}"
      - "docker.io/enix/{{ .Env.IMAGE_NAME }}"
    tags: *busybox-tags
    sbom: false
    labels: *busybox-labels

  # Tilt mode: single image consumed by `Tiltfile`'s custom_build. The
  # dev image deliberately uses the `busybox` variant (not the project
  # default `scratch`) so we get a shell in the dev pod for `kubectl
  # exec` debugging — a developer ergonomics choice, not the release
  # default. Only host arch. The image+tag are read from the env vars
  # Tilt sets via the wrapper script in the Tiltfile, so the resulting
  # image lands in local Docker under exactly the ref Tilt expects
  # (skips_local_docker=False).
  - id: tilt
    disable: '{{ if eq (envOrDefault "GORELEASER_TILT" "") "1" }}{{ else }}true{{ end }}'
    ids: [x509ce-local]
    dockerfile: build/Dockerfile.busybox
    platforms:
      - "linux/{{ .Runtime.Goarch }}"
    images:
      - '{{ envOrDefault "TILT_IMAGE_REPO" "x509-certificate-exporter" }}'
    tags:
      - '{{ envOrDefault "TILT_IMAGE_TAG" "tilt" }}'
    sbom: false
    labels: *busybox-labels

# ─── Cosign on container images ──────────────────────────────────────────────
# Sign by digest (anchored to immutable content). Consumers verify the
# same ref they pull. With dockers_v2 there's no separate "manifest"
# artifact category — each pushed multi-arch index manifest appears as
# a "Docker Image" artifact, which `artifacts: images` targets.
docker_signs:
  - id: image-cosign
    cmd: cosign
    artifacts: images
    args:
      - sign
      - --yes
      - "${artifact}@${digest}"
    output: true

# ─── GitHub Release ──────────────────────────────────────────────────────────
release:
  github:
    owner: enix
    name: x509-certificate-exporter
  # Auto-detect prerelease from semver suffix (-alpha, -beta, -rc).
  prerelease: auto
  # Create and leave the release as a draft — the maintainer publishes
  # it manually once the assets and changelog have been reviewed.
  draft: true

# ─── Changelog ───────────────────────────────────────────────────────────────
changelog:
  use: github
  sort: desc
  filters:
    exclude:
      - "^ci[(:!]"
      - "^chores?[(:!]"
      - "^refactor[(:!]"
      - "^tests?[(:!]"
      - "^build[(:!]"
      - "^Merge "
  groups:
    - title: "Security Updates"
      regexp: "^security[(:!]"
      order: 0
    - title: "Features"
      regexp: "^feat[(:!]"
      order: 1
    - title: "Bug Fixes"
      regexp: "^fix[(:!]"
      order: 2
    - title: "Performance"
      regexp: "^perf[(:!]"
      order: 3
    - title: "Dependencies"
      regexp: "^deps[(:!]"
      order: 4
    - title: "Documentation"
      regexp: "^docs?[(:!]"
      order: 5
    - title: "Other"
      order: 99
