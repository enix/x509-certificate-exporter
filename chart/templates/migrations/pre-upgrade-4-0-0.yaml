{{/*
Pre-upgrade hook for v3 → v4 chart upgrades.

Why: v4 flipped `service.headless` to `true` by default, which sets
`clusterIP: None` on the Service. Kubernetes refuses to mutate a
Service's clusterIP in place — `spec.clusterIPs[0]: may not change once
set` — so an `helm upgrade` from a v3 release with an assigned ClusterIP
to a v4 default install fails before any other reconciliation.

Strategy: if the existing Service carries a `helm.sh/chart` label
matching a chart version <4.0.0, AND the new release will render a
Service (`.Values.service.create` is true), delete it pre-upgrade so
helm can recreate it from the new template — headless or otherwise,
whichever the new values dictate.
*/}}
{{- $needsMigration := false }}
{{- if and .Release.IsUpgrade .Values.service.create }}
  {{- $ns := include "x509-certificate-exporter.namespace" . }}
  {{- $svcName := include "x509-certificate-exporter.fullname" . }}
  {{- $existingSvc := lookup "v1" "Service" $ns $svcName }}
  {{- if $existingSvc }}
    {{- $chartLabel := index $existingSvc.metadata.labels "helm.sh/chart" }}
    {{- if $chartLabel }}
      {{- $prevVersion := trimPrefix "x509-certificate-exporter-" $chartLabel }}
      {{- if semverCompare "<4.0.0" $prevVersion }}
        {{- $needsMigration = true }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if $needsMigration }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "x509-certificate-exporter.fullname" . }}-pre-upgrade-4-0-0
  namespace: {{ include "x509-certificate-exporter.namespace" . }}
  labels:
    {{- include "x509-certificate-exporter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "x509-certificate-exporter.fullname" . }}-pre-upgrade-4-0-0
  namespace: {{ include "x509-certificate-exporter.namespace" . }}
  labels:
    {{- include "x509-certificate-exporter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "x509-certificate-exporter.fullname" . }}-pre-upgrade-4-0-0
  namespace: {{ include "x509-certificate-exporter.namespace" . }}
  labels:
    {{- include "x509-certificate-exporter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "x509-certificate-exporter.fullname" . }}-pre-upgrade-4-0-0
subjects:
- kind: ServiceAccount
  name: {{ include "x509-certificate-exporter.fullname" . }}-pre-upgrade-4-0-0
  namespace: {{ include "x509-certificate-exporter.namespace" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "x509-certificate-exporter.fullname" . }}-pre-upgrade-4-0-0
  namespace: {{ include "x509-certificate-exporter.namespace" . }}
  labels:
    {{- include "x509-certificate-exporter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      {{- with .Values.migration.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.migration.extraLabels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "x509-certificate-exporter.fullname" . }}-pre-upgrade-4-0-0
      restartPolicy: OnFailure
      {{- with .Values.migration.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: kubectl
        image: {{ include "migration.kubectlImage" . | quote }}
        imagePullPolicy: {{ .Values.migration.image.pullPolicy }}
        {{- with .Values.migration.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.migration.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command:
        - kubectl
        - delete
        - --ignore-not-found=true
        - -n
        - {{ include "x509-certificate-exporter.namespace" . }}
        - service/{{ include "x509-certificate-exporter.fullname" . }}
{{- end }}
